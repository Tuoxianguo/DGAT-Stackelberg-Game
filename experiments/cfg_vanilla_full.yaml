# Vanilla Transformer baseline (no HSMM, no graph) — A0 ablation.
data_root: "data/raw/mit_hf"
cache_dir: "data/processed/mit_cache_full"
manifest_csv: "data/interim/mit_manifest_full.csv"
meta_csv: "data/interim/mit_meta.csv"

n_cycles: 100
intra_len: 64
features: ["voltage_v", "current_a", "temperature_c", "capacity_ah"]

model: "vanilla"
d_model: 96
n_layers: 3
n_heads: 4
epochs: 80
batch_size: 8
lr: 0.0003
weight_decay: 0.0005
seed: 42
out_dir: "experiments/run_full_vanilla"
